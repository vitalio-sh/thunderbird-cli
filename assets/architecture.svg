<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#0d1117"/>

  <text x="800" y="75" text-anchor="middle" font-size="38" font-weight="700" fill="#e6edf3">thunderbird-cli — architecture</text>
  <text x="800" y="115" text-anchor="middle" font-size="18" fill="#8b949e">localhost-only  ·  agents → bridge → Thunderbird  ·  no cloud, no telemetry, no stored credentials</text>

  <g font-size="13" fill="#8b949e" font-weight="600" letter-spacing="2">
    <text x="215" y="170" text-anchor="middle">CLIENTS</text>
    <text x="555" y="170" text-anchor="middle">NPM ENTRYPOINTS</text>
    <text x="910" y="170" text-anchor="middle">BRIDGE DAEMON</text>
    <text x="1340" y="170" text-anchor="middle">THUNDERBIRD DESKTOP</text>
  </g>

  <g>
    <rect x="100" y="210" width="230" height="100" rx="14" ry="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="215" y="250" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">AI Agent</text>
    <text x="215" y="275" text-anchor="middle" font-size="13" fill="#8b949e">Claude Code · shell scripts</text>
    <text x="215" y="295" text-anchor="middle" font-size="13" fill="#8b949e">curl · anything HTTP</text>
  </g>

  <g>
    <rect x="100" y="380" width="230" height="100" rx="14" ry="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="215" y="420" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Claude Desktop</text>
    <text x="215" y="445" text-anchor="middle" font-size="13" fill="#8b949e">MCP client</text>
    <text x="215" y="465" text-anchor="middle" font-size="13" fill="#8b949e">(claude_desktop_config.json)</text>
  </g>

  <g>
    <rect x="440" y="210" width="230" height="100" rx="14" ry="14" fill="#161b22" stroke="#58a6ff" stroke-width="1.8"/>
    <text x="555" y="248" text-anchor="middle" font-size="22" font-weight="700" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">tb</text>
    <text x="555" y="272" text-anchor="middle" font-size="13" fill="#e6edf3">CLI · 38 commands</text>
    <text x="555" y="293" text-anchor="middle" font-size="12" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">npm: thunderbird-cli</text>
  </g>

  <g>
    <rect x="440" y="380" width="230" height="100" rx="14" ry="14" fill="#161b22" stroke="#a371f7" stroke-width="1.8"/>
    <text x="555" y="418" text-anchor="middle" font-size="22" font-weight="700" fill="#a371f7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">tb-mcp</text>
    <text x="555" y="442" text-anchor="middle" font-size="13" fill="#e6edf3">MCP server · 12 tools</text>
    <text x="555" y="463" text-anchor="middle" font-size="12" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">npm: thunderbird-cli-mcp</text>
  </g>

  <g>
    <rect x="790" y="225" width="240" height="240" rx="14" ry="14" fill="#161b22" stroke="#58a6ff" stroke-width="1.8"/>
    <text x="910" y="262" text-anchor="middle" font-size="20" font-weight="700" fill="#e6edf3">Bridge daemon</text>
    <text x="910" y="285" text-anchor="middle" font-size="12" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">npm: thunderbird-cli-bridge</text>

    <rect x="815" y="305" width="190" height="62" rx="8" ry="8" fill="#0d1117" stroke="#30363d"/>
    <text x="910" y="327" text-anchor="middle" font-size="13" fill="#8b949e">HTTP server</text>
    <text x="910" y="352" text-anchor="middle" font-size="17" font-weight="700" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">127.0.0.1:7700</text>

    <rect x="815" y="379" width="190" height="62" rx="8" ry="8" fill="#0d1117" stroke="#30363d"/>
    <text x="910" y="401" text-anchor="middle" font-size="13" fill="#8b949e">WebSocket server</text>
    <text x="910" y="426" text-anchor="middle" font-size="17" font-weight="700" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">127.0.0.1:7701</text>
  </g>
  <text x="910" y="490" text-anchor="middle" font-size="12" fill="#8b949e" font-style="italic">stateless HTTP ↔ WS proxy · UUID correlation</text>

  <g>
    <rect x="1170" y="195" width="340" height="500" rx="16" ry="16" fill="#161b22" stroke="#d15228" stroke-width="2"/>
    <text x="1340" y="235" text-anchor="middle" font-size="20" font-weight="700" fill="#e6edf3">Thunderbird 128+</text>
    <text x="1340" y="258" text-anchor="middle" font-size="12" fill="#8b949e">macOS · Linux · Windows</text>

    <rect x="1200" y="288" width="280" height="92" rx="10" ry="10" fill="#0d1117" stroke="#30363d"/>
    <text x="1340" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#d15228">WebExtension</text>
    <text x="1340" y="341" text-anchor="middle" font-size="12" fill="#e6edf3">43 route handlers · WS client</text>
    <text x="1340" y="361" text-anchor="middle" font-size="12" fill="#8b949e">signed on addons.thunderbird.net</text>

    <text x="1340" y="410" text-anchor="middle" font-size="13" fill="#8b949e">calls</text>
    <line x1="1340" y1="380" x2="1340" y2="432" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowDim)"/>

    <rect x="1200" y="442" width="280" height="62" rx="10" ry="10" fill="#0d1117" stroke="#30363d"/>
    <text x="1340" y="468" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">messenger.* API</text>
    <text x="1340" y="488" text-anchor="middle" font-size="12" fill="#8b949e">WebExtension APIs</text>

    <text x="1340" y="534" text-anchor="middle" font-size="13" fill="#8b949e">IMAP / SMTP / EWS</text>
    <line x1="1340" y1="504" x2="1340" y2="555" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowDim)"/>

    <rect x="1200" y="565" width="280" height="98" rx="10" ry="10" fill="#0d1117" stroke="#30363d"/>
    <text x="1340" y="596" text-anchor="middle" font-size="17" font-weight="700" fill="#e6edf3">Your email accounts</text>
    <text x="1340" y="620" text-anchor="middle" font-size="13" fill="#8b949e">credentials stay in Thunderbird</text>
    <text x="1340" y="642" text-anchor="middle" font-size="12" fill="#8b949e" font-style="italic">tested: 22 accounts · 249K messages</text>
  </g>

  <g stroke="#58a6ff" stroke-width="2.5" fill="none">
    <line x1="330" y1="260" x2="435" y2="260" marker-end="url(#arrow)"/>
    <line x1="330" y1="430" x2="435" y2="430" marker-end="url(#arrow)"/>
    <line x1="670" y1="260" x2="785" y2="315" marker-end="url(#arrow)"/>
    <line x1="670" y1="430" x2="785" y2="385" marker-end="url(#arrow)"/>
    <line x1="1030" y1="335" x2="1165" y2="320" marker-end="url(#arrow)"/>
  </g>

  <g font-size="12" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="382" y="250" text-anchor="middle">HTTP</text>
    <text x="382" y="420" text-anchor="middle">stdio</text>
    <text x="730" y="285" text-anchor="middle">HTTP :7700</text>
    <text x="730" y="418" text-anchor="middle">HTTP :7700</text>
    <text x="1097" y="305" text-anchor="middle">WebSocket :7701</text>
  </g>

  <g font-size="13" fill="#8b949e">
    <rect x="100" y="770" width="1400" height="72" rx="10" ry="10" fill="#161b22" stroke="#30363d"/>
    <text x="130" y="800" font-weight="700" fill="#e6edf3" font-size="14">Design principles</text>
    <text x="130" y="824">Thunderbird is source of truth  ·  CLI is a dumb pipe  ·  atomic JSON output  ·  idempotent ops  ·  <tspan fill="#e6edf3" font-weight="600">--confirm</tspan> for destructive actions</text>
    <text x="1470" y="824" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">MIT · v1.0.1</text>
  </g>
</svg>
