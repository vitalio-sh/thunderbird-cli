<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="15%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#d15228" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#0d1117"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <g transform="translate(100, 155)">
    <g transform="translate(0, -10)">
      <path d="M 0 30 L 60 30 M 30 0 L 30 60 M 9 9 L 51 51 M 51 9 L 9 51" stroke="#d15228" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="85" y="50" font-size="64" font-weight="800" fill="url(#title)" letter-spacing="-1.5" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace">thunderbird-cli</text>
  </g>

  <text x="100" y="275" font-size="30" font-weight="500" fill="#e6edf3">Give Claude full access to your email</text>
  <text x="100" y="315" font-size="30" font-weight="500" fill="#8b949e">through Mozilla Thunderbird.</text>

  <g transform="translate(100, 375)" font-size="19" fill="#c9d1d9">
    <g>
      <circle cx="8" cy="-6" r="4" fill="#3fb950"/>
      <text x="26" y="0">38 CLI commands  ·  12 MCP tools for Claude Desktop</text>
    </g>
    <g transform="translate(0, 38)">
      <circle cx="8" cy="-6" r="4" fill="#3fb950"/>
      <text x="26" y="0">localhost-only  ·  credentials never leave Thunderbird</text>
    </g>
    <g transform="translate(0, 76)">
      <circle cx="8" cy="-6" r="4" fill="#3fb950"/>
      <text x="26" y="0">tested at 22 accounts  ·  249,000+ messages</text>
    </g>
  </g>

  <g transform="translate(760, 145)">
    <rect x="0" y="0" width="420" height="320" rx="14" ry="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <g transform="translate(18, 20)">
      <circle cx="0" cy="0" r="6" fill="#ff5f56"/>
      <circle cx="22" cy="0" r="6" fill="#ffbd2e"/>
      <circle cx="44" cy="0" r="6" fill="#27c93f"/>
      <text x="210" y="5" text-anchor="middle" font-size="12" fill="#6e7681" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">tb — stats</text>
    </g>
    <line x1="0" y1="48" x2="420" y2="48" stroke="#30363d" stroke-width="1"/>

    <g font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="14">
      <text x="24" y="80" fill="#8b949e">$ <tspan fill="#e6edf3">tb stats</tspan></text>
      <text x="24" y="108" fill="#8b949e">{</text>
      <text x="40" y="128" fill="#a371f7">"ok"<tspan fill="#8b949e">:</tspan> <tspan fill="#79c0ff">true</tspan><tspan fill="#8b949e">,</tspan></text>
      <text x="40" y="148" fill="#a371f7">"data"<tspan fill="#8b949e">: {</tspan></text>
      <text x="56" y="168" fill="#a371f7">"accounts"<tspan fill="#8b949e">:</tspan> <tspan fill="#79c0ff">22</tspan><tspan fill="#8b949e">,</tspan></text>
      <text x="56" y="188" fill="#a371f7">"total_messages"<tspan fill="#8b949e">:</tspan> <tspan fill="#79c0ff">249203</tspan><tspan fill="#8b949e">,</tspan></text>
      <text x="56" y="208" fill="#a371f7">"unread"<tspan fill="#8b949e">:</tspan> <tspan fill="#79c0ff">86825</tspan><tspan fill="#8b949e">,</tspan></text>
      <text x="56" y="228" fill="#a371f7">"flagged"<tspan fill="#8b949e">:</tspan> <tspan fill="#79c0ff">1204</tspan><tspan fill="#8b949e">,</tspan></text>
      <text x="56" y="248" fill="#a371f7">"folders"<tspan fill="#8b949e">:</tspan> <tspan fill="#79c0ff">387</tspan></text>
      <text x="40" y="268" fill="#8b949e">}</text>
      <text x="24" y="288" fill="#8b949e">}</text>
      <text x="24" y="308" fill="#3fb950">▌</text>
    </g>
  </g>

  <g transform="translate(100, 555)" font-size="15" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="0" y="0">MIT</text>
    <text x="55" y="0" fill="#30363d">·</text>
    <text x="75" y="0">80 tests</text>
    <text x="160" y="0" fill="#30363d">·</text>
    <text x="180" y="0">Thunderbird 128+</text>
    <text x="365" y="0" fill="#30363d">·</text>
    <text x="385" y="0">npm: thunderbird-cli</text>
    <text x="610" y="0" fill="#30363d">·</text>
    <text x="630" y="0">MCP compatible</text>
  </g>

  <text x="1180" y="575" text-anchor="end" font-size="14" fill="#6e7681" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">github.com/vitalio-sh/thunderbird-cli</text>
</svg>
